<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InfraGard STL – Registered Users</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="app-page">

  <!-- ─── Navbar ─────────────────────────────────────────────────────────── -->
  <nav class="navbar">
    <div class="navbar-brand">
      <a href="dashboard.html" class="brand-link">
        <img src="images/infragard-logo.png" alt="InfraGard STL" class="navbar-logo" />
        <span class="brand-text">InfraGard STL</span>
      </a>
    </div>

    <ul class="navbar-links">
      <li>
        <a href="logs.html">Logs</a>
      </li>
      <li>
        <a href="registered-users.html" class="active">Registered Users</a>
      </li>
      <li>
        <a href="manual-entry.html">Manual Entry</a>
      </li>
      <li>
        <button class="btn btn-ghost btn-sm" id="logoutBtn">Logout</button>
      </li>
    </ul>
  </nav>

  <!-- ─── Page content ────────────────────────────────────────────────────── -->
  <main class="page-content">
    <div class="page-header">
      <h2>Registered Users</h2>
      <div class="logs-toolbar">
        <input
          type="search"
          id="searchInput"
          class="search-input"
          placeholder="Search by name, email, or code…"
        />
      </div>
    </div>

    <p class="page-desc">
      Find a registered attendee and check them in manually — useful when someone has lost their QR code.
    </p>

    <!-- Spinner while loading -->
    <div id="usersLoading" class="loading-state">
      <div class="spinner"></div>
      <p>Loading attendees…</p>
    </div>

    <!-- Empty state -->
    <div id="usersEmpty" class="empty-state" style="display:none;">
      <p>No attendees found.</p>
    </div>

    <!-- Table -->
    <div class="table-wrap" id="tableWrap" style="display:none;">
      <table class="logs-table" id="usersTable">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Code</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="usersBody"></tbody>
      </table>
    </div>
  </main>

  <!-- Confirmation toast -->
  <div id="toast" class="toast" role="alert" aria-live="polite"></div>

  <script src="js/registered-users.js"></script>
</body>
</html>
